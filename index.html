<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(160deg, #f5f3f3 0%, #e8e4e1 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #2c2c2c;
  position: relative;
  overflow: hidden;
  transition: background 1.5s ease;
}

.stars {
  position: absolute;
  width: 1px;
  height: 1px;
  background: transparent;
  box-shadow: 
    100px 200px white, 200px 400px white, 300px 100px white,
    400px 300px white, 500px 50px white, 600px 450px white,
    700px 250px white, 800px 150px white;
  animation: blink 4s infinite alternate;
  opacity: 0;
  transition: opacity 1s ease;
}

body.lit {
  background: linear-gradient(160deg, #2a2a38 0%, #12121a 100%);
  color: #f0f0f0;
}

body.lit .stars {
  opacity: 1;
}

.card {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  max-width: 480px;
  width: 100%;
  padding: 70px 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.8);
  animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
  transform: translateY(30px);
  transition: background 1.5s ease, border 1.5s ease, box-shadow 1.5s ease;
}

body.lit .card {
  background: rgba(40, 40, 55, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.cake {
  font-size: 54px;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeIn 0.8s 0.3s forwards, flicker 3s infinite alternate;
  filter: brightness(0.8);
  transition: filter 0.8s ease;
}

body.lit .cake {
  filter: brightness(1.2);
  text-shadow: 0 0 15px rgba(255, 210, 100, 0.6);
}

@keyframes flicker {
  0% { transform: scale(1); }
  100% { transform: scale(1.05) rotate(2deg); }
}

h1 {
  font-size: 32px;
  font-weight: 500;
  margin-bottom: 12px;
  color: #1a1a1a;
  opacity: 0;
  animation: fadeIn 0.8s 0.5s forwards;
  transition: color 1.5s ease;
}

body.lit h1 {
  color: #fefefe;
}

.name {
  font-size: 20px;
  color: #666;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeIn 0.8s 0.7s forwards;
  transition: color 1.5s ease;
}

body.lit .name {
  color: #ddd;
}

.wish {
  font-size: 16px;
  color: #555;
  line-height: 1.8;
  white-space: pre-line;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeIn 0.8s 0.9s forwards;
  transition: color 1.5s ease;
}

body.lit .wish {
  color: #eee;
}

.message {
  font-size: 14px;
  color: #999;
  line-height: 1.7;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.8s ease, opacity 0.8s ease, margin 0.8s ease;
  margin-top: -20px;
  padding-top: 0;
  border-top: 1px solid transparent;
}

body.lit .message {
  max-height: 200px;
  opacity: 1;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.2);
  color: #ccc;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.button {
  display: inline-block;
  padding: 14px 32px;
  border-radius: 50px;
  background: #1a1a1a;
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.3s ease;
  opacity: 0;
  animation: fadeIn 0.8s 1.1s forwards;
  cursor: pointer;
}

.button:hover {
  transform: translateY(-2px);
}

body.lit .button {
  background: #ffd700;
  color: #1a1a1a;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
}

@keyframes blink {
  0% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* 音乐不隐藏，保证能出声 */
#audioPlayer {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 40px;
  height: 40px;
  opacity: 0.1;
  z-index: 999;
}
</style>
</head>

<body>
<div class="stars"></div>

<div class="card">
  <div class="cake">🎂</div>
  <h1>Happy Birthday</h1>
  <div class="name">致我最好的朋友</div>
  <div class="wish">愿新的一岁
平安顺遂，自在欢喜
所念皆如愿，所行皆坦途</div>

  <div class="button" id="lightBtn">点亮祝福</div>

  <div class="message">
    很高兴在这漫长的岁月里与你并肩。<br>
    希望这个新的开始，能带给你无限的勇气。<br>
    不用刻意发光，你本就是星辰。<br>
    生日快乐，不止今日，而是朝朝暮暮。
  </div>
</div>

<audio id="audioPlayer" loop controls>
  <source src="birthday_song.mp3" type="audio/mpeg">


<script>
  const lightBtn = document.getElementById('lightBtn');
  const body = document.body;
  const audio = document.getElementById('audioPlayer');

  lightBtn.addEventListener('click', function() {
    body.classList.add('lit');
    lightBtn.innerText = '祝福已送达';
    lightBtn.style.pointerEvents = 'none';

    audio.play().catch(() => {
      document.addEventListener('click', () => {
        audio.play();
      }, { once: true });
    });
  });
</script>

</body>
</html>
